name: API Health Check
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check Amsterdam
        run: curl -sf https://evez-api2.fly.dev/health || exit 1
      - name: Check US East
        run: curl -sf https://evez-api-iad.fly.dev/health || exit 1
      - name: Check Singapore
        run: curl -sf https://evez-api-sin.fly.dev/health || exit 1
      - name: Check Sydney
        run: curl -sf https://evez-api-syd.fly.dev/health || exit 1
      - name: Check FreeClaw
        run: curl -sf https://freeclaw.fly.dev/api/models || exit 1
