version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: evez
      POSTGRES_USER: evez
      POSTGRES_PASSWORD: evez_local_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evez"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: --js --store_dir /data
    volumes:
      - natsdata:/data

  evez-api:
    build: .
    ports:
      - "9090:9090"
    environment:
      PORT: 9090
      MASTER_KEY: evez-admin-kr4cken2025
      DATABASE_URL: postgres://evez:evez_local_dev@postgres:5432/evez
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    volumes:
      - ./data:/app/data

volumes:
  pgdata:
  natsdata:
